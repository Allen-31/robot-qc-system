spring.application.name=RobotQcSystem
server.port=8080

spring.profiles.active=dev

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/robot_qc}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.jdbc-type-for-null=NULL
mybatis.type-aliases-package=com.zioneer.robotqcsystem.domain.entity
mybatis.mapper-locations=classpath:mapper/**/*.xml

spring.sql.init.mode=never

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.baseline-on-migrate=true

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=3s

logging.level.com.zioneer.robotqcsystem=info
logging.pattern.level=%5p [traceId:%X{traceId}]

management.endpoints.web.exposure.include=health,info,metrics,loggers,threaddump
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true

# Keycloak OAuth2 Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/robot-qc}

# BFF login client for Keycloak token exchange
app.keycloak.client-id=${KEYCLOAK_CLIENT_ID:robot-qc-frontend}

# Keycloak Admin API
keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME:admin}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:admin}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Dev-only: allow admin password reset (keep disabled in production)
# app.dev.reset-admin-enabled=true

# Operation file upload directory
app.operation.file.upload-dir=${OPERATION_FILE_UPLOAD_DIR:./uploads/operation-files}

# Operation package upload directory
app.operation.package.upload-dir=${OPERATION_PACKAGE_UPLOAD_DIR:./uploads/operation-packages}

# Rest client timeouts
app.http.connect-timeout=3s
app.http.read-timeout=10s
