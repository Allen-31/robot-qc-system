spring.application.name=RobotQcSystem
server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/robot_qc}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.jdbc-type-for-null=NULL
mybatis.type-aliases-package=com.zioneer.robotqcsystem.domain.entity
mybatis.mapper-locations=classpath:mapper/**/*.xml

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql,classpath:data-menu.sql
spring.sql.init.encoding=UTF-8

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=3s

logging.level.com.zioneer.robotqcsystem=info

# JWT（生产环境请修改 secret 并使用环境变量）
app.jwt.secret=${JWT_SECRET:RobotQcSystemJwtSecretKeyForSigningTokenAtLeast256BitsRequired}
app.jwt.access-token-seconds=86400
app.jwt.remember-multiplier=7
app.jwt.issuer=RobotQcSystem

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# 开发时可将 admin 密码重置为 admin123（仅本地调试用，生产务必关闭）
# app.dev.reset-admin-enabled=true
